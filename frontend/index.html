<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 0; 
      user-select: none; -webkit-user-select: none; 
      background: transparent; color: #777;
    }
    
    /* === Keypad & Input Area === */
    .input-section {
      background: #111; padding: 5px; border-radius: 12px;
      margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      border: 1px solid #333;
    }
    .display-box {
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      height: 40px; margin-bottom: 5px; text-align: right; font-size: 1.8em;
      font-weight: 700; padding: 0 15px; line-height: 40px; color: #999;
      letter-spacing: 2px; overflow: hidden;
    }
    .display-placeholder { color: #555; font-size: 0.6em; }
    
    .keypad-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 5px;
    }
    .key-btn {
      background: #2a2a2a; color: #888; border: 1px solid #333; border-radius: 6px;
      height: 35px; font-size: 1.3em; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.1s;
    }
    .key-btn:active { background: #3a3a3a; }
    
    /* === Action Buttons === */
    .action-row { display: flex; gap: 4px; margin-bottom: 5px; }
    .act-btn {
      flex: 1; border: none; border-radius: 6px; height: 35px; font-size: 1em;
      font-weight: bold; color: #bbb; cursor: pointer; transition: opacity 0.1s, transform 0.1s;
    }
    .act-btn:active { opacity: 0.8; transform: scale(0.96); }
    .btn-big { background-color: #722; }
    .btn-reg { background-color: #247; }
    .btn-now { background: #762; color: #ddd; }
    
    .delete-row { display: flex; gap: 4px;}
    .del-btn {
      flex: 1; background: #333; color: #999; border: 1px solid #444; border-radius: 6px;
      padding: 6px 0; font-size: 0.85em; font-weight: bold; cursor: pointer;
    }
    .del-btn:active { opacity: 0.8; }
    .btn-del-all { background: #222; border-color: #422; color: #a55; }

    /* === History List === */
    .history-container { 
      padding: 5px 5px; background: #111; border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 1px solid #333; 
    }
    .history-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; gap: 3px; white-space: nowrap;}
    .cut-row { background: #0a0a0a; opacity: 0.4; }
    
    .col-num { width: 42px; flex-shrink: 0; color: #666; font-size: 0.85em; font-weight: 500; text-align: left; padding-left: 2px;}
    .col-br { width: 30px; flex-shrink: 0; font-weight: 900; font-size: 0.95em; cursor: pointer; text-align: center; }
    .txt-big { color: #833; }
    .txt-reg { color: #358; }
    .col-game { width: 45px; flex-shrink: 0; text-align: left; font-weight: 700; font-size: 0.95em; color: #888; cursor: pointer; background: #1a1a1a; border-radius: 4px;}
    .col-game:active { background: #333; }
    
    .col-cum { color: #666; font-size: 0.9em; text-align: right; flex-grow: 1; padding-right:2px;}
    .col-cum-gray { color: #444; font-size: 0.85em; text-align: right; flex-grow: 1; padding-right:2px;}
    
    /* Boundary Line */
    .boundary-wrap { 
      height: 30px; position: relative; margin: 0; z-index: 10; touch-action: none; display: flex; align-items: center; justify-content: center; cursor: grab; background: #1a1a1a;
    }
    .boundary-wrap:active { cursor: grabbing; }
    .boundary-line { 
      position: absolute; width: 100%; height: 20px; background-color: #232; border: 1px solid #343; border-radius: 4px; z-index: -1;
    }
    .boundary-label { color: #484; font-size: 0.9em; font-weight: bold; display: flex; align-items: center; gap: 8px;}
    
    .current-row { border-bottom: none; border-top: 2px dashed #333; padding-top: 10px; margin-top: 2px; }
    .final-total { color: #833; font-size: 1.3em; font-weight: 900; text-align: right; flex-grow: 1; margin-left: 10px; padding-right:5px;}
    
    .dragging-overlay { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 9999; display: none; }
    .empty-msg {text-align:center; padding: 20px; color: #555;}
  </style>
</head>
<body>
  <div class="dragging-overlay" id="dragOverlay"></div>
  
  <div class="input-section">
    <div class="display-box" id="displayBox"><span class="display-placeholder">数値を入力...</span></div>
    
    <div class="keypad-grid">
      <button class="key-btn" onclick="pressKey('1')">1</button>
      <button class="key-btn" onclick="pressKey('2')">2</button>
      <button class="key-btn" onclick="pressKey('3')">3</button>
      <button class="key-btn" onclick="pressKey('4')">4</button>
      <button class="key-btn" onclick="pressKey('5')">5</button>
      <button class="key-btn" onclick="pressKey('6')">6</button>
      <button class="key-btn" onclick="pressKey('7')">7</button>
      <button class="key-btn" onclick="pressKey('8')">8</button>
      <button class="key-btn" onclick="pressKey('9')">9</button>
      <button class="key-btn" onclick="pressClear()" style="font-size: 1.2em;">クリア</button>
      <button class="key-btn" onclick="pressKey('0')">0</button>
      <button class="key-btn" onclick="pressBackspace()">⌫</button>
    </div>
    
    <div class="action-row">
      <button class="act-btn btn-big" onclick="addRecord('BIG')">BIG</button>
      <button class="act-btn btn-reg" onclick="addRecord('REG')">REG</button>
      <button class="act-btn btn-now" onclick="addRecord('現在G')">現在</button>
    </div>
    
    <div class="delete-row">
      <button class="del-btn" onclick="deleteLast()">1つ削除</button>
      <button class="del-btn btn-del-all" onclick="clearAll()">全て削除</button>
    </div>
  </div>

  <div id="root"></div>

  <script>
    let currentData = null;
    let isDragging = false;
    let startY = 0;
    let startOrigin = 0;
    let rowHeight = 49;
    
    let inputStr = "";

    function updateDisplay() {
      let box = document.getElementById("displayBox");
      if(inputStr === "") {
        box.innerHTML = '<span class="display-placeholder">数値を入力...</span>';
      } else {
        box.innerHTML = inputStr;
      }
    }

    function pressKey(char) {
      if(inputStr.length < 4) {
        if(inputStr === "0") inputStr = char;
        else inputStr += char;
        updateDisplay();
      }
    }
    
    function pressBackspace() {
      if(inputStr.length > 0) {
        inputStr = inputStr.slice(0, -1);
        updateDisplay();
      }
    }

    function pressClear() {
      inputStr = "";
      updateDisplay();
    }

    // ========== Data Mutation ==========
    
    function addRecord(type) {
      if(!currentData) return;
      let gVal = parseInt(inputStr || "0", 10);
      
      if(type === '現在G') {
        currentData.current_game = gVal;
      } else {
        let br = type.includes('BIG') ? "🔴 BIG" : "🔵 REG";
        // Append to history (oldest is index 0, so newest goes to the end)
        currentData.history.push({ BR: br, "ゲーム数": gVal });
      }
      
      pressClear();
      render();
      sendUpdate();
    }
    
    function deleteLast() {
      if(!currentData) return;
      if(currentData.current_game > 0) {
        currentData.current_game = 0;
      } else if(currentData.history.length > 0) {
        currentData.history.pop();
        if(currentData.origin_idx > currentData.history.length) {
            currentData.origin_idx = currentData.history.length;
        }
      }
      render();
      sendUpdate();
    }
    
    function clearAll() {
      if(!currentData) return;
      if(confirm("全ての履歴を削除しますか？")) {
        currentData.history = [];
        currentData.current_game = 0;
        currentData.origin_idx = 0;
        render();
        sendUpdate();
      }
    }

    // ========== Rendering ==========

    function editGameCount(idx) {
      if(!currentData || !currentData.history) return;
      let oldG = currentData.history[idx]["ゲーム数"];
      let val = prompt("新しいゲーム数を入力してください (半角数字):", oldG);
      if(val !== null && val.trim() !== "") {
        let n = parseInt(val, 10);
        if(!isNaN(n) && n >= 0) {
          currentData.history[idx]["ゲーム数"] = n;
          render();
          sendUpdateToStreamlit();
        } else {
          alert("正しい数値を入力してください。");
        }
      }
    }

    function editCurrentGame() {
      if(!currentData) return;
      let val = prompt("現在の進行ゲーム数を入力してください (半角数字):", currentData.current_game);
      if(val !== null && val.trim() !== "") {
        let n = parseInt(val, 10);
        if(!isNaN(n) && n >= 0) {
          currentData.current_game = n;
          render();
          sendUpdateToStreamlit();
        } else {
          alert("正しい数値を入力してください。");
        }
      }
    }

    function render() {
      if(!currentData) return;
      let html = "";
      let total_games = 0;
      let len = currentData.history.length;
      
      let current_count = 1;

      if(len === 0 && currentData.current_game === 0) {
         html += "<div class='history-container'><div class='empty-msg'>履歴がありません。<br>上のテンキーで入力・追加してください。</div></div>";
         document.getElementById("root").innerHTML = html;
         setFrameHeight();
         return;
      }

      html += "<div class='history-container'>";

      for(let i=0; i < len; i++) {
        if(i === currentData.origin_idx) html += renderBoundary();
        
        let row = currentData.history[i];
        let is_cut = i < currentData.origin_idx;
        let isBig = row.BR.includes("BIG");
        let txtClass = isBig ? "txt-big" : "txt-reg";
        let bLbl = isBig ? "BIG" : "REG";
        let rowClass = "history-row" + (is_cut ? " cut-row" : "");
        
        let count_str = is_cut ? `<span style="color:#ccc;">-</span>` : `${current_count++}回目`;

        html += `<div class='${rowClass}'>
          <div class='col-num'>${count_str}</div>
          <div class='col-br ${txtClass}' onclick='toggleBR(${i})'>${bLbl}</div>
          <div class='col-game' onclick='editGameCount(${i})' title='タップして編集'>${row["ゲーム数"]}G</div>`;
          
        if(is_cut) {
          html += `<div class='col-cum-gray'>除外</div>`;
        } else {
          let stG = total_games + row["ゲーム数"];
          let enG = stG + (isBig ? 69 : 29);
          total_games = enG;
          html += `<div class='col-cum'>${stG}G &rarr; ${enG}G</div>`;
        }
        
        html += `</div>`;
      }
      
      if(currentData.origin_idx === len) html += renderBoundary();

      // Current row
      let fg = currentData.current_game;
      if (fg > 0 || total_games > 0) {
        let ft = total_games + fg;
        html += `<div class='history-row current-row'>
          <div class='col-num'>${fg > 0 ? (current_count + "回?") : "現在"}</div>
          <div class='col-br' style='color:#ffc107; font-weight:900; width:45px; flex-shrink:0; text-align:left;'>現在G</div>
          <div class='col-game' onclick='editCurrentGame()' title='タップして編集'>${fg}G</div>
          <div class='final-total'>${ft}G</div>
        </div>`;
      }
      html += "</div>";
      document.getElementById("root").innerHTML = html;
      
      // Bind drag events
      let bWrap = document.querySelector('.boundary-wrap');
      if(bWrap) {
        bWrap.addEventListener('touchstart', onDragStart, {passive: false});
        bWrap.addEventListener('touchmove', onDragMove, {passive: false});
        bWrap.addEventListener('touchend', onDragEnd);
        bWrap.addEventListener('mousedown', onDragStart);
      }
      setFrameHeight();
    }

    function renderBoundary() {
      return `<div class='boundary-wrap'>
        <div class='boundary-line'></div>
        <div class='boundary-label'>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7M19 5l-7-7-7 7"/></svg>
          区切り線
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7M5 19l7 7 7-7"/></svg>
        </div>
      </div>`;
    }

    function toggleBR(index) {
      if(!currentData) return;
      let row = currentData.history[index];
      row.BR = row.BR.includes("BIG") ? "🔵 REG" : "🔴 BIG";
      render();
      sendUpdate();
    }

    function onDragStart(e) {
      if(e.cancelable) e.preventDefault();
      isDragging = true;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      startOrigin = currentData.origin_idx;
      document.getElementById('dragOverlay').style.display = 'block';
    }

    document.addEventListener('mousemove', onDragMove, {passive: false});
    document.addEventListener('mouseup', onDragEnd);

    function onDragMove(e) {
      if(!isDragging) return;
      if(e.cancelable) e.preventDefault();
      let cy = e.touches ? e.touches[0].clientY : e.clientY;
      let diffY = cy - startY;
      let steps = Math.round(diffY / rowHeight);
      let newOrigin = Math.max(0, Math.min(currentData.history.length, startOrigin + steps));
      if(newOrigin !== currentData.origin_idx) {
        currentData.origin_idx = newOrigin;
        render(); 
      }
    }

    function onDragEnd(e) {
      if(!isDragging) return;
      isDragging = false;
      document.getElementById('dragOverlay').style.display = 'none';
      sendUpdate();
    }

    function setFrameHeight() {
      let height = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: height
      }, "*");
    }

    function sendUpdate() {
      let outList = currentData.history.map(r => ({ BR: r.BR, "ゲーム数": r["ゲーム数"] }));
      let val = {
        history_updated: outList,
        origin_idx: currentData.origin_idx,
        current_game: currentData.current_game
      };
      
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: val
      }, "*");
    }

    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "streamlit:render") {
          let pyData = event.data.args.data;
          currentData = {
              history: pyData.history,
              current_game: pyData.current_game,
              origin_idx: pyData.origin_idx
          };
          render();
      }
    });

    // Let Streamlit know we are ready
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:componentReady",
      apiVersion: 1
    }, "*");
    
    // Initial height calculation
    window.setTimeout(() => {
        setFrameHeight();
    }, 100);
  </script>
</body>
</html>
